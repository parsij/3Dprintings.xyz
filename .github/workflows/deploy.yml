name: Deploy Website

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.SERVER_IP || secrets.SERVER_HOST }}
      DEPLOY_USER: ${{ secrets.SERVER_USER || 'root' }}
      DEPLOY_PORT: ${{ secrets.SERVER_PORT || '22' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Frontend
        run: |
          npm install
          npm run build

      - name: Prepare SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          sed -i 's/\r$//' ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy Frontend Files (rsync)
        run: |
          # UPDATED PATH: Pointing to the new unified main-app directory
          rsync -avzr --delete -e "ssh -i ~/.ssh/id_ed25519 -p ${DEPLOY_PORT} -o StrictHostKeyChecking=no" \
          dist/ ${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/main-app/dist

      - name: Update Backend & Permissions via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP || secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER || 'root' }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. FIX PERMISSIONS: Ensure Nginx can read the newly uploaded files immediately
            sudo chown -R www-data:www-data /var/www/main-app/dist
            sudo chmod -R 755 /var/www/main-app/dist

            # 2. Navigate to backend directory
            cd ~/3Dprintings.xyz/src/backend || exit 1

            # 3. Sync code with GitHub
            git fetch origin master
            git reset --hard origin/master

            # 4. Install production dependencies
            npm install --omit=dev

            # 5. PM2 Management
            PM2_PATH=$(which pm2 || echo "/usr/local/bin/pm2")
            
            if $PM2_PATH info api-backend > /dev/null 2>&1; then
              echo "Restarting api-backend..."
              $PM2_PATH restart api-backend --update-env
            else
              echo "Starting api-backend for the first time..."
              $PM2_PATH start server.cjs --name "api-backend"
            fi
            
            $PM2_PATH save