name: Deploy Website

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Frontend
        run: |
          npm install
          npm run build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Deploy Frontend Files (rsync)
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          rsync -avzr --delete -e "ssh -o StrictHostKeyChecking=no" dist/ root@${SERVER_IP}:/var/www/3dprintings.xyz/dist

      - name: Update Backend via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Ensure the backend directory exists
            mkdir -p ~/3Dprintings.xyz/src/backend
            cd ~/3Dprintings.xyz/src/backend
            
            # Pull latest code
            git pull origin master
            
            # Install production dependencies only
            npm install --production
            
            # Restart the process (or start it if it's new)
            pm2 restart api-backend || pm2 start index.js --name "api-backend"
