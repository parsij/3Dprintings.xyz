name: Deploy Website

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.SERVER_IP || secrets.SERVER_HOST }}
      DEPLOY_USER: ${{ secrets.SERVER_USER || 'root' }}
      DEPLOY_PORT: ${{ secrets.SERVER_PORT || '22' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Frontend
        run: |
          npm install
          npm run build

      - name: Prepare SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "Missing SSH_PRIVATE_KEY in GitHub repository secrets."
            exit 1
          fi

          install -m 700 -d ~/.ssh

          # Support both raw multiline keys and keys stored with literal '\n'
          if printf '%s' "${SSH_PRIVATE_KEY}" | grep -q '\\n'; then
            printf '%b' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          else
            printf '%s' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          fi

          # Normalize Windows line endings if present
          sed -i 's/\r$//' ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Validate key format early with a clear failure
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            echo "SSH_PRIVATE_KEY is invalid, encrypted with a passphrase, or incorrectly formatted."
            echo "Expected unencrypted OpenSSH private key with proper line breaks."
            exit 1
          fi

      - name: Validate Deploy Secrets
        run: |
          if [ -z "${DEPLOY_HOST}" ]; then
            echo "Missing deploy host secret. Set SERVER_IP (or SERVER_HOST) in GitHub repository secrets."
            exit 1
          fi

      - name: Deploy Frontend Files (rsync)
        run: |
          rsync -avzr --delete -e "ssh -i ~/.ssh/id_ed25519 -p ${DEPLOY_PORT} -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" dist/ ${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/3dprintings.xyz/dist

      - name: Update Backend via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP || secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER || 'root' }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Ensure the backend directory exists
            mkdir -p ~/3Dprintings.xyz/src/backend
            cd ~/3Dprintings.xyz/src/backend
            
            # Pull latest code
            git pull origin master
            
            # Install production dependencies only
            npm install --production
            
            # Restart the process (or start it if it's new)
            pm2 restart api-backend || pm2 start index.js --name "api-backend"
