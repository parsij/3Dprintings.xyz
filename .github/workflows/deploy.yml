name: Deploy Website

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Frontend
        run: |
          npm install
          npm run build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace
          # We use ${SRV_IP} here because the 'env' block below
          # allows it to bypass GitHub's logger masking.
          config: |
            Host myserver
              HostName ${SRV_IP}
              User root
              StrictHostKeyChecking no
        env:
          SRV_IP: ${{ secrets.SERVER_IP }}

      - name: Deploy Frontend Files (rsync)
        run: |
          # rsync now uses the alias 'myserver' which has the real IP mapped
          rsync -avzr --delete dist/ myserver:/var/www/3dprintings.xyz/dist

      - name: Update Backend via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Ensure the backend directory exists
            mkdir -p ~/3Dprintings.xyz/src/backend
            cd ~/3Dprintings.xyz/src/backend
            
            # Pull latest code
            git pull origin master
            
            # Install production dependencies only
            npm install --production
            
            # Restart the process (or start it if it's new)
            pm2 restart api-backend || pm2 start index.js --name "api-backend"