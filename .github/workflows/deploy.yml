name: Deploy Website

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Frontend
        run: |
          npm install
          npm run build

      - name: Deploy Frontend Files (rsync)
        uses: Burnett01/rsync-deployments@7.0.1 # Updated version
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /var/www/3dprintings.xyz/dist
          remote_host: ${{ secrets.SERVER_IP }}
          remote_user: root
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Update Backend via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Added a safety check to make sure the directory exists before git pull
          script: |
            mkdir -p ~/3Dprintings.xyz/src/backend
            cd ~/3Dprintings.xyz/src/backend
            git pull origin master || echo "Git pull failed, check branch name"
            npm install --production
            pm2 restart api-backend || pm2 start index.js --name "api-backend"