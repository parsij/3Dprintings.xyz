name: Deploy Website

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Frontend
        run: |
          npm install
          npm run build

      # NEW STEP: This handles the SSH key perfectly and prevents "libcrypto" errors
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Deploy Frontend Files (rsync)
        # Using a simpler rsync command because we already set up the SSH key above
        run: |
          rsync -avzr --delete -e "ssh -o StrictHostKeyChecking=no" dist/ root@${{ secrets.SERVER_IP }}:/var/www/3dprintings.xyz/dist

      - name: Update Backend via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/3Dprintings.xyz/src/backend
            git pull origin master
            npm install --production
            pm2 restart api-backend || pm2 start index.js --name "api-backend"