<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Shop physical 3D printed parts and downloadable 3D model files from independent creators on 3Dprintings.xyz."
    />
    <meta name="theme-color" content="#fff7ed" />
    <meta property="og:site_name" content="3Dprintings.xyz" />
    <meta property="og:title" content="3Dprintings.xyz | Physical 3D Prints & Model Files" />
    <meta
      property="og:description"
      content="Discover useful 3D printed products, replacement parts, display pieces, and ready-to-print digital files."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/social-preview.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://3dprintings.xyz/home" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>3Dprintings.xyz | Physical 3D Prints & Model Files</title>
    <script>
      (() => {
        const storageKey = "theme-preference";
        const allowedThemes = new Set(["light", "dark"]);
        let theme;

        try {
          const storedTheme = window.localStorage.getItem(storageKey);
          if (allowedThemes.has(storedTheme)) {
            theme = storedTheme;
          }
        } catch {
          theme = undefined;
        }

        if (!theme) {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
